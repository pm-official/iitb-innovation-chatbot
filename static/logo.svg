<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- IIT Bombay inspired logo -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00529b"/>
      <stop offset="100%" style="stop-color:#003d75"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#f5a623" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- IIC Text -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="48" fill="#f5a623" letter-spacing="4">IIC</text>
  <!-- IITB Text -->
  <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="white">IIT BOMBAY</text>
  <!-- Innovation text -->
  <text x="100" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="13" fill="rgba(255,255,255,0.8)" letter-spacing="2">INNOVATION</text>
  <!-- Lightbulb icon at top -->
  <g transform="translate(100, 38)" fill="#f5a623">
    <path d="M0,-12 C-6,-12 -10,-7 -10,-1 C-10,3 -7,6 -5,8 L-4,10 L4,10 L5,8 C7,6 10,3 10,-1 C10,-7 6,-12 0,-12z" fill="none" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="-3" y1="11" x2="3" y2="11" stroke="#f5a623" stroke-width="1.2"/>
    <line x1="-2" y1="13" x2="2" y2="13" stroke="#f5a623" stroke-width="1.2"/>
  </g>
</svg>
